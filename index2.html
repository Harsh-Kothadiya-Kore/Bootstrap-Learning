<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login & Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #4e73df, #1cc88a);
      height: 100vh;
    }

    .card {
      border-radius: 15px;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #4e73df;
    }
  </style>
</head>
<body class="d-flex justify-content-center align-items-center">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card shadow-lg p-4">

        <!-- Nav Tabs -->
        <ul class="nav nav-tabs mb-3" id="myTab" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">Login</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register">Register</button>
          </li>
        </ul>

        <div class="tab-content">

          <!-- LOGIN FORM -->
          <div class="tab-pane fade show active" id="login">
            <h4 class="text-center mb-3">Welcome Back</h4>
            <form>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter email" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter password" required>
              </div>

              <div class="d-grid">
                <button class="btn btn-primary">Login</button>
              </div>
            </form>
          </div>

          <!-- REGISTER FORM -->
          <div class="tab-pane fade" id="register">
            <h4 class="text-center mb-3">Create Account</h4>
            <form>
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter name" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter email" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create password" required>
              </div>

              <div class="d-grid">
                <button class="btn btn-success">Register</button>
              </div>
            </form>
          </div>

        </div>

      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
