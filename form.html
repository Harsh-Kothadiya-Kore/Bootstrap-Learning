<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <h1 style="text-align: center;">Form</h1>

    <div class="container" style="border: 4px solid blue;">

        <form>
            <div class="row">
                <div class="col-6">
                    <div class="mb-2">
                        <label class="mb-1">First Name</label>
                        <input type="text" class="form-control" placeholder="Enter Your First Name">
                    </div>
                </div>
                <div class="col-6">
                    <div class="mb-2">
                        <label class="mb-1">Last Name</label>
                        <input type="text" class="form-control" placeholder="Enter Your Last Name">
                    </div>
                </div>

            </div>

            <div class="mb-2">
                <label class="mb-1">Email</label>
                <input type="email" class="form-control" placeholder="Enter Your Email">
            </div>

            <div class="mb-2">
                <label class="mb-1">Password</label>
                <input type="password" class="form-control" placeholder="Enter Your Password">
            </div>

            <div class="mb-2">
                <label class="mb-1">City</label>
                <select class="form-control">
                    <option>Delhi</option>
                    <option>Mumbai</option>
                    <option>Chennai</option>
                    <option>Kolkata</option>
                </select>
            </div>

            <div class="mb-2">
                <label>Read Only Field</label>
                <input type="text" class="form-control" value="This Filed is Read Only" readonly>
            </div>

            <div class="mb-2">
                <label>Disabled Field</label>
                <input type="text" class="form-control" value="This Filed is Disabled" disabled>
            </div>

            <div class="mb-2">
                <label class="mb-1">Upload File</label>
                <input type="file" class="form-control">
            </div>

            <div class="mb-2">
                <label class="mb-1">Gender</label>
                <div class="form-check">
                    <input type="radio" class="form-check-input" name="gender" id="male">
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check">
                    <input type="radio" class="form-check-input" name="gender" id="female">
                    <label class="form-check-label" for="female">Female</label>
                </div>
                <div class="form-check">
                    <input type="radio" class="form-check-input" name="gender" id="other">
                    <label class="form-check-label" for="other">Other</label>
                </div>
            </div>

            <div class="mb-2">
                <label class="mb-1">Skills</label>
                <div class="row">
                    <div class="col-2">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input">
                            <label class="form-check-label" for="other">SQL</label>
                        </div>
                    </div>

                    <div class="col-2">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input">
                            <label class="form-check-label" for="other">HTML</label>
                        </div>
                    </div>

                    <div class="col-2">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input">
                            <label class="form-check-label" for="other">CSS</label>
                        </div>
                    </div>

                    <div class="col-2">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input">
                            <label class="form-check-label" for="other">JS</label>
                        </div>
                    </div>

                    <div class="col-2">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input">
                            <label class="form-check-label" for="other">Node.js</label>
                        </div>
                    </div>

                    <div class="col-2">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input">
                            <label class="form-check-label" for="other">React</label>
                        </div>
                    </div>
                </div>

            </div>

            <div class="mb-2">
                <label class="mb-1">Message</label>
                <textarea class="form-control" placeholder="Enter Your Message"></textarea>
            </div>

            <button type="submit" class="btn btn-primary m-3">Submit</button>   
            <button type="reset" class="btn btn-danger m-3">Reset</button>
        </form>

    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
