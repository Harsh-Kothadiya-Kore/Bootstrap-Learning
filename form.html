<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
.required::after {
    content: " *";
    color: red;
}



</style>


</head>

<body>

    <h1 style="text-align: center;">Form</h1>

    <div class="container" style="border: 4px solid blue;">

        <form>
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="firstName" class="form-label required">First Name</label>
                        <input type="text" class="form-control" id="firstName" placeholder="Enter Your First Name">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="lastName" class="form-label required">Last Name</label>
                        <input type="text" class="form-control" id="lastName" placeholder="Enter Your Last Name">
                    </div>
                </div>

            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control form-control-lg" id="email" placeholder="Enter Your Email">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control form-control-sm" id="password" placeholder="Enter Your Password">
            </div>

            <div class="mb-3">
                <label for="city" class="form-label">City</label>
                <select class="form-select" id="city">
                    <option>Delhi</option>
                    <option>Mumbai</option>
                    <option>Chennai</option>
                    <option>Kolkata</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Read Only Field</label>
                <input type="text" class="form-control" value="This Filed is Read Only" readonly>
            </div>

            <div class="mb-3">
                <label>Disabled Field</label>
                <input type="text" class="form-control" value="This Filed is Disabled" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label" for="upload">Upload File</label>
                <input type="file" class="form-control" id="upload">
            </div>

            <div class="mb-3">
                <label class="mb-1">Gender</label>
                <div class="form-check">
                    <input type="radio" class="form-check-input" name="gender" id="male">
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check">
                    <input type="radio" class="form-check-input" name="gender" id="female">
                    <label class="form-check-label" for="female">Female</label>
                </div>
                <div class="form-check">
                    <input type="radio" class="form-check-input" name="gender" id="other">
                    <label class="form-check-label" for="other">Other</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Skills</label>
                <div class="row">
                    <div class="col-2">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="sql">
                            <label class="form-check-label" for="sql">SQL</label>
                        </div>
                    </div>

                    <div class="col-2">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="html">
                            <label class="form-check-label" for="html">HTML</label>
                        </div>
                    </div>

                    <div class="col-2">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="css">
                            <label class="form-check-label" for="css">CSS</label>
                        </div>
                    </div>

                    <div class="col-2">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="js">
                            <label class="form-check-label" for="js">JS</label>
                        </div>
                    </div>

                    <div class="col-2">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="node">
                            <label class="form-check-label" for="node">Node.js</label>
                        </div>
                    </div>

                    <div class="col-2">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="react">
                            <label class="form-check-label" for="react">React</label>
                        </div>
                    </div>
                </div>

            </div>

            <div class="mb-3">
                <label class="form-label" for="message">Message</label>
                <textarea class="form-control" id="message" placeholder="Enter Your Message"></textarea>
            </div>

            <button type="submit" class="btn btn-primary m-3" >Submit</button>   
            <button type="reset" class="btn btn-danger m-3">Reset</button>
            
        </form>

    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
